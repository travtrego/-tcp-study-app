name: Rebuild Full App

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/rebuild-full-app.yml'

permissions:
  contents: write

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Rebuild full index from payload
        run: |
          python - <<'PY'
          from pathlib import Path
          import base64, gzip

          chunks = sorted(Path('payload').glob('chunk-*.txt'))
          if not chunks:
              raise SystemExit('No payload chunks found')
          encoded = ''.join(p.read_text(encoding='utf-8') for p in chunks)
          encoded = ''.join(encoded.split())
          compressed = base64.b64decode(encoded, validate=True)
          html = gzip.decompress(compressed)
          marker = b'TCP Mastery \xe2\x80\x94 Unit 1 \xc2\xb7 v33'
          if marker not in html:
              raise SystemExit('v33 marker missing from rebuilt app')
          Path('index.html').write_bytes(html)
          print(f'Rebuilt index.html: {len(html)} bytes from {len(chunks)} chunks')
          PY
      - name: Replace service worker with direct-app version
        run: |
          cat > sw.js <<'EOF'
          const CACHE='tcp-mastery-v33-direct-1';
          const CORE=['./','./index.html','./manifest.json','./icon-192.png','./icon-512.png'];
          const OFFLINE_URL='./index.html';

          self.addEventListener('install',event=>{
            event.waitUntil(caches.open(CACHE).then(cache=>cache.addAll(CORE.map(url=>new Request(url,{cache:'reload'})))));
          });
          self.addEventListener('message',event=>{
            if(event.data&&event.data.type==='SKIP_WAITING')self.skipWaiting();
          });
          self.addEventListener('activate',event=>{
            event.waitUntil(caches.keys().then(keys=>Promise.all(keys.filter(key=>key!==CACHE).map(key=>caches.delete(key)))).then(()=>self.clients.claim()));
          });
          self.addEventListener('fetch',event=>{
            const req=event.request;
            if(req.method!=='GET')return;
            const url=new URL(req.url);
            if(url.origin!==self.location.origin)return;
            if(req.mode==='navigate'){
              event.respondWith((async()=>{
                try{
                  const fresh=await fetch(req,{cache:'no-store'});
                  if(fresh&&fresh.ok){
                    const cache=await caches.open(CACHE);
                    cache.put(OFFLINE_URL,fresh.clone()).catch(()=>{});
                  }
                  return fresh;
                }catch(e){
                  return (await caches.match(OFFLINE_URL)) || new Response('<h1>TCP Mastery is offline</h1><p>Reconnect once to finish installation.</p>',{headers:{'Content-Type':'text/html; charset=utf-8'},status:503});
                }
              })());
              return;
            }
            event.respondWith((async()=>{
              const cached=await caches.match(req);
              if(cached)return cached;
              try{
                const fresh=await fetch(req);
                if(fresh&&fresh.ok){
                  const cache=await caches.open(CACHE);
                  cache.put(req,fresh.clone()).catch(()=>{});
                }
                return fresh;
              }catch(e){
                return new Response('',{status:504,statusText:'Offline'});
              }
            })());
          });
          EOF
      - name: Simplify Vercel headers
        run: |
          cat > vercel.json <<'EOF'
          {
            "cleanUrls": true,
            "trailingSlash": false,
            "headers": [
              {
                "source": "/index.html",
                "headers": [
                  { "key": "Cache-Control", "value": "public, max-age=0, must-revalidate" }
                ]
              },
              {
                "source": "/sw.js",
                "headers": [
                  { "key": "Cache-Control", "value": "public, max-age=0, must-revalidate" },
                  { "key": "Service-Worker-Allowed", "value": "/" }
                ]
              },
              {
                "source": "/manifest.json",
                "headers": [
                  { "key": "Content-Type", "value": "application/manifest+json" }
                ]
              }
            ]
          }
          EOF
      - name: Commit rebuilt direct app
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html sw.js vercel.json
          git diff --cached --quiet && exit 0
          git commit -m "Deploy full v33 app without payload loader"
          git push
