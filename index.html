<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#121b34">
  <title>TCP Mastery — Loading v33</title>
  <style>
    html,body{height:100%;margin:0;background:#080d1a;color:#f3f6ff;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif}
    main{min-height:100%;display:grid;place-items:center;padding:24px;box-sizing:border-box;text-align:center}
    .card{max-width:520px;padding:24px;border:1px solid #283655;border-radius:18px;background:#111a2e;box-shadow:0 14px 34px rgba(0,0,0,.3)}
    h1{margin:0 0 10px;font-size:24px}.muted{color:#9aa8c3;line-height:1.5}.error{color:#ff9aa5;white-space:pre-wrap}
  </style>
</head>
<body>
<main><section class="card"><h1>TCP Mastery v33</h1><p id="status" class="muted">Loading the study app…</p></section></main>
<script>
(async()=>{
  const status=document.getElementById('status');
  const sleep=ms=>new Promise(resolve=>setTimeout(resolve,ms));
  async function getText(url){
    let lastError;
    for(let attempt=1;attempt<=3;attempt++){
      try{
        const response=await fetch(url,{cache:'no-store',credentials:'same-origin'});
        if(!response.ok) throw new Error(`HTTP ${response.status}`);
        return await response.text();
      }catch(error){
        lastError=error;
        if(attempt<3) await sleep(500*attempt);
      }
    }
    throw new Error(`Failed to download ${url.pathname}: ${lastError?.message||'network error'}`);
  }
  try{
    if('serviceWorker' in navigator){
      const registrations=await navigator.serviceWorker.getRegistrations();
      await Promise.all(registrations.map(registration=>registration.unregister()));
    }
    if('caches' in window){
      const keys=await caches.keys();
      await Promise.all(keys.map(key=>caches.delete(key)));
    }
    if(typeof DecompressionStream==='undefined') throw new Error('This browser does not support the required decompression feature. Update Chrome and reload.');
    const version='v33-final-20260718-4';
    const paths=Array.from({length:8},(_,i)=>new URL(`/payload/chunk-${String(i).padStart(2,'0')}.txt?v=${version}`,location.origin));
    status.textContent='Loading question bank…';
    const chunks=[];
    for(let i=0;i<paths.length;i++){
      status.textContent=`Loading question bank… ${i+1} of ${paths.length}`;
      chunks.push(await getText(paths[i]));
    }
    let b64=chunks.join('').replace(/[^A-Za-z0-9+/=]/g,'').replace(/=/g,'');
    const remainder=b64.length%4;
    if(remainder) b64+='='.repeat(4-remainder);
    if(!b64.startsWith('H4sI')) throw new Error('The downloaded app data is not the expected v33 package.');
    const compressed=Uint8Array.from(atob(b64),character=>character.charCodeAt(0));
    const stream=new Blob([compressed]).stream().pipeThrough(new DecompressionStream('gzip'));
    const html=await new Response(stream).text();
    if(!html.includes('TCP Mastery — Unit 1 · v33')) throw new Error('App integrity check failed: the v33 document marker was not found.');
    document.open();
    document.write(html);
    document.close();
  }catch(error){
    console.error(error);
    status.className='error';
    status.textContent=`The app could not start.\n\n${error.message}\n\nClose this tab completely, reopen the site, and reload once.`;
  }
})();
</script>
</body>
</html>
